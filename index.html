<body id="mainBody">

<header>
    <div id="title">MI-MOLLETTE</div>
    <select class="lang-select" id="langPicker" onchange="changeLang(this.value)">
        <option value="fr">Français</option>
        <option value="en">English</option>
        <option value="ar">عربي</option>
    </select>
</header>

<div id="container">
    <div id="cardList"></div>
    <div class="empty-msg" id="emptyMsg"></div>
</div>

<div class="controls">
    <label class="upload-label" id="uploadBtnText" for="fileInput">Ajouter une carte</label>
    <input type="file" id="fileInput" accept="image/*" multiple>
</div>

<script>
    const translations = {
        fr: { title: "MI-MOLLETTE", add: "Ajouter une carte", empty: "Aucune carte.<br>Appuyez sur le bouton vert pour en ajouter une.", confirm: "Supprimer cette carte ?", dir: "ltr" },
        en: { title: "MI-MOLLETTE", add: "Add New Card", empty: "No cards yet.<br>Tap the green button to add one.", confirm: "Remove this card?", dir: "ltr" },
        ar: { title: "مي-موليت", add: "إضافة بطاقة", empty: "لا توجد بطاقات.<br>اضغط على الزر الأخضر للإضافة.", confirm: "حذف هذه البطاقة؟", dir: "rtl" }
    };

    let currentLang = 'fr';

    function changeLang(lang) {
        currentLang = lang;
        document.getElementById('mainBody').dir = translations[lang].dir;
        document.getElementById('title').innerText = translations[lang].title;
        document.getElementById('uploadBtnText').innerText = translations[lang].add;
        renderCards();
    }

    const fileInput = document.getElementById('fileInput');
    const cardList = document.getElementById('cardList');

    window.onload = () => {
        changeLang('fr');
    };

    fileInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (event) => {
                saveCard(event.target.result);
            };
            reader.readAsDataURL(file);
        });
        fileInput.value = ""; // Reset input so same file can be added again if deleted
    };

    function saveCard(data) {
        let cards = JSON.parse(localStorage.getItem('miMolletteCards') || '[]');
        cards.push(data);
        localStorage.setItem('miMolletteCards', JSON.stringify(cards));
        renderCards();
    }

        if(confirm(translations[currentLang].confirm)) {

            localStorage.setItem('miMolletteCards', JSON.stringify(cards));
            renderCards();
        }
    }
