<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Loyalty Cards</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22My%20Wallet%22,%22short_name%22:%22Wallet%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#000000%22}">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: #333; color: white; width: 100%; padding: 15px 0; text-align: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #container { width: 95%; max-width: 500px; padding: 10px; }
        .card-wrapper { background: white; margin-bottom: 20px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        img { width: 100%; display: block; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; }
        .controls { padding: 20px; text-align: center; }
        input[type="file"] { display: none; }
        .upload-label { background: #007bff; color: white; padding: 15px 30px; border-radius: 30px; font-size: 1.2rem; cursor: pointer; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .empty-msg { color: #666; margin-top: 50px; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>MY LOYALTY CARDS</header>

<div id="container">
    <div id="cardList"></div>
    <div class="controls">
        <label class="upload-label" id="uploadLabel">Add New Card Screenshot</label>
        <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const cardList = document.getElementById('cardList');
    const uploadLabel = document.getElementById('uploadLabel');

    // Load cards on startup
    window.onload = loadCards;

    uploadLabel.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const files = e.target.files;
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64String = event.target.result;
                saveCard(base64String);
            };
            reader.readAsDataURL(file);
        }
    };

    function saveCard(data) {
        let cards = JSON.parse(localStorage.getItem('myCards') || '[]');
        cards.push(data);
        localStorage.setItem('myCards', JSON.stringify(cards));
        renderCards();
    }

    function deleteCard(index) {
        if(confirm("Remove this card?")) {
            let cards = JSON.parse(localStorage.getItem('myCards') || '[]');
            cards.splice(index, 1);
            localStorage.setItem('myCards', JSON.stringify(cards));
            renderCards();
        }
    }

    function renderCards() {
        const cards = JSON.parse(localStorage.getItem('myCards') || '[]');
        cardList.innerHTML = cards.length ? '' : '<p class="empty-msg">No cards added yet.<br>Tap the button below to start.</p>';
        cards.forEach((src, index) => {
            const div = document.createElement('div');
            div.className = 'card-wrapper';
            div.innerHTML = `<img src="${src}"><button class="delete-btn" onclick="deleteCard(${index})">X</button>`;
            cardList.appendChild(div);
        });
    }

    function loadCards() { renderCards(); }
</script>

</body>
</html>
